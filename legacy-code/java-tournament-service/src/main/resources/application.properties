# Game Arena Tournament Service - Legacy Configuration
# Spring Boot 2.7.18 with blocking I/O

# Server Configuration
server.port=8080

# H2 Database Configuration (In-Memory)
spring.datasource.url=jdbc:h2:mem:tournamentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.gamearena.tournament=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Application Name
spring.application.name=tournament-service-legacy
